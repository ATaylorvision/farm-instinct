services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: farminstinct
      POSTGRES_PASSWORD: farminstinct
      POSTGRES_DB: farminstinct
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farminstinct -d farminstinct"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://farminstinct:farminstinct@db:5432/farminstinct
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-to-a-long-random-string}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      CORS_ORIGINS: http://localhost:3000
      ADMIN_EMAILS: ${ADMIN_EMAILS:-ataylor@vanderbiltsecurities.com}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
