# Render Blueprint — provisions Farm Instinct backend + Postgres in one click.
#
# How to use:
#   1. Push this file to GitHub (already done if you're reading it from main).
#   2. In Render, go to: https://dashboard.render.com/blueprints
#   3. Click "New Blueprint Instance" and select your farm-instinct repo.
#   4. Render reads this file, provisions the database, builds the backend image,
#      and wires DATABASE_URL automatically.
#   5. After the backend is deployed, set CORS_ORIGINS to your Vercel URL via the
#      Render dashboard (Environment tab on the backend service).
#
# Note: the frontend is hosted separately on Vercel — it doesn't appear here.

databases:
  - name: farminstinct-db
    databaseName: farminstinct
    user: farminstinct
    plan: free
    region: oregon

services:
  - type: web
    name: farminstinct-api
    runtime: docker
    repo: https://github.com/ATaylorvision/farm-instinct
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: farminstinct-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true   # Render generates a strong random value once
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ORIGINS
        # Set this to your Vercel URL (e.g. https://farm-instinct.vercel.app) after
        # the frontend is deployed. You can edit it in the Render dashboard.
        value: http://localhost:3000
      - key: ADMIN_EMAILS
        value: taylor@vblt.com
